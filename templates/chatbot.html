<div id="chatbot-button" title="Chat con Portgas Bot">
    <i class="bi bi-fire"></i>
</div>

<div id="chatbot-container" class="hidden">
    <div id="chatbot-header">
        <div class="chatbot-header__info">
            <div class="chatbot-avatar">
                <i class="bi bi-fire"></i>
            </div>
            <div>
                <div class="chatbot-name">Mr. Portgas</div>
                <div class="chatbot-status">En línea</div>
            </div>
        </div>
    </div>

    <div id="chatbot-messages"></div>

    <div id="chatbot-input-area">
        <input type="text" id="chatbot-input" placeholder="Escribe un mensaje..." autocomplete="off">
        <button id="chatbot-send" title="Enviar">
            <i class="bi bi-send-fill"></i>
        </button>
    </div>
</div>
