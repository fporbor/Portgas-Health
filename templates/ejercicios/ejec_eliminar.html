{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Confirmar eliminación</h5>
            </div>
            <div class="card-body">
                <p>¿Estás seguro de que quieres eliminar el ejercicio <strong>{{ ejercicio.nombre }}</strong>? Esta acción no se puede deshacer.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        <a href="{% url 'ejercicios:detalle' ejercicio.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
