{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 700px;">
    <h2>Eliminar Gimnasio</h2>

    <p>¿Seguro que quieres eliminar <strong>{{ gimnasio.nombre }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Eliminar</button>
        <a href="{% url 'gimnasios:gym_detalle' gimnasio.pk %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
