{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portgas Health{% endblock %}</title>
    <link rel="icon" href="{% static 'img/icon_black.png' %}" type="image/png">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>
    <nav>
        <a href="/">Inicio</a>
        <a href="/gimnasios/">Gimnasios</a>
        <a href="/ejercicio/">Ejercicios</a>
        <a href="/receta/">Recetas</a>

        {% if user.is_authenticated %}
            <span>Hola, {{ user.username }}</span>
            <a href="/logout/">Salir</a>
        {% else %}
            <a href="/login/">Entrar</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
