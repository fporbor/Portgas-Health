{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portgas Health{% endblock %}</title>
    <link rel="icon" href="{% static 'favicon.ico' %}">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-portgas">
    <div class="container" style="max-width:1200px">

        <a class="nav-brand" href="/">PORTGAS HEALTH</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false"
                aria-label="Abrir menú">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">

            <ul class="navbar-nav nav-portgas mx-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="bi bi-house-door"></i>Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/gimnasios/"><i class="bi bi-building"></i>Gimnasios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/ejercicios/"><i class="bi bi-lightning-charge"></i>Ejercicios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/recetas/"><i class="bi bi-egg-fried"></i>Recetas</a>
                </li>
            </ul>

            <div class="nav-auth-divider"></div>

            <div class="d-flex align-items-center gap-2 flex-wrap">
                {% if user.is_authenticated %}
                    <div class="nav-user">
                        <span class="nav-user-dot"></span>
                        {{ user.username }}
                    </div>
                    <form method="POST" action="/logout/">
                        {% csrf_token %}
                        <button type="submit" class="btn-nav-logout">
                            <i class="bi bi-box-arrow-right"></i>Salir
                        </button>
                    </form>
                {% else %}
                    <a href="/login/" class="btn-nav-login">
                        <i class="bi bi-person"></i>Entrar
                    </a>
                {% endif %}
            </div>

        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        const path = window.location.pathname;
        document.querySelectorAll('.nav-portgas .nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href === path || (href !== '/' && path.startsWith(href))) {
                link.classList.add('active');
            }
        });
    })();
</script>

</body>
</html>
