services:

  # ── Django app ─────────────────────────────────────────
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app                        # live reload en desarrollo
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # ── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME:-portgas}
      POSTGRES_USER:     ${DB_USER:-portgas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portgas}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portgas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Nginx (static files + reverse proxy) ───────────────
  nginx:
    image: nginx:alpine
    volumes:
      - static_volume:/app/staticfiles:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: